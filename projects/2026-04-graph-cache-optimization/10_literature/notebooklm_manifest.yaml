notebook:
  id: "TBD"
  title: "2026 04 Graph Cache Optimization Literature Evidence"
  profile: "default"
  cli_alias: "2026-04-graph-cache-optimization"

interface_policy:
  preferred_for_cli:
    - "notebook creation"
    - "source import"
    - "alias management"
    - "artifact download"
  preferred_for_mcp:
    - "structured note operations"
    - "batch queries when MCP tools are available"
  ask_when_both_available: true

imported_sources:
  - notebooklm_source_id: "TBD"
    source_id: "SRC-TBD"
    source_type: "other"
    import_type: "text"
    import_status: "pending"
    citation_status: "unverified"
    rights_status: "unknown"
    imported_on: "TBD"
    last_synced: "TBD"
    export_paths: []
    notes: "Canonical source metadata belongs in source_manifest.yaml."

export_policy:
  directory: "10_literature/notebooklm_exports"
  index: "10_literature/notebooklm_exports/export_index.yaml"
  allowed_formats:
    - "markdown"
    - "text"
    - "json"
  rule: "Exports are leads for evidence_map.md, not final citations or claims.yaml evidence."

sync_policy:
  record_every_import: true
  verify_before_claims: true
  stale_drive_sources_checked: false
  last_checked: "TBD"

allowed_uses:
  - "Literature source organization"
  - "Source-grounded Q&A during P1 and P3"
  - "Reviewer-risk discovery from imported sources"
  - "Drafting evidence_map.md notes after source verification"

prohibited_uses:
  - "Do not store secrets, cookies, credentials, or private keys."
  - "Do not treat NotebookLM summaries as final facts."
  - "Do not replace repository code inspection."
  - "Do not replace experiment logs, metrics, or statistical tests."
  - "Do not create manuscript claims outside claims.yaml."
  - "Do not cite NotebookLM exports directly as supported claim evidence."

