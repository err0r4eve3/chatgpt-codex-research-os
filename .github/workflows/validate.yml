name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dev requirements
        run: python -m pip install -r requirements-dev.txt
      - name: Compile Python scripts
        run: |
          python -m py_compile scripts/new_project.py scripts/validate_artifacts.py scripts/check_line_endings.py
          python -m py_compile tests/run_validator_cases.py
          python -m py_compile templates/project/40_code/repo/scripts/run_experiment.py
          python -m py_compile templates/project/40_code/repo/scripts/aggregate.py
          python -m py_compile templates/project/60_analysis/aggregate_results.py
      - name: Check line endings
        run: python scripts/check_line_endings.py
      - name: Validate template
        run: python scripts/validate_artifacts.py --template
      - name: Run validator regression cases
        run: python tests/run_validator_cases.py
      - name: Create smoke project
        run: python scripts/new_project.py 2026-04-smoke-test --force
      - name: Validate smoke project
        run: python scripts/validate_artifacts.py --project projects/2026-04-smoke-test
      - name: Run smoke code path
        run: |
          cd projects/2026-04-smoke-test/40_code/repo
          make test
          make smoke
          make aggregate
      - name: Validate projects
        run: python scripts/validate_artifacts.py --all
